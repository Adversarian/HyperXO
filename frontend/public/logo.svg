<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="rose-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle 3x3 grid lines -->
  <g stroke="#27272a" stroke-width="2" opacity="0.5">
    <line x1="185" y1="72" x2="185" y2="440"/>
    <line x1="327" y1="72" x2="327" y2="440"/>
    <line x1="72" y1="185" x2="440" y2="185"/>
    <line x1="72" y1="327" x2="440" y2="327"/>
  </g>

  <!-- X mark (cyan, left-leaning) -->
  <g stroke="url(#cyan-grad)" stroke-width="52" stroke-linecap="round" opacity="0.95">
    <line x1="120" y1="120" x2="280" y2="280"/>
    <line x1="280" y1="120" x2="120" y2="280"/>
  </g>

  <!-- O mark (rose, offset to bottom-right) -->
  <circle cx="336" cy="336" r="80" fill="none" stroke="url(#rose-grad)" stroke-width="48" opacity="0.95"/>
</svg>
